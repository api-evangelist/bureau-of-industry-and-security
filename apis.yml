description: >-
  The Bureau of Industry and Security (BIS), a division of the U.S. Department
  of Commerce, advances U.S. national security, foreign policy, and economic
  objectives by administering an effective export control and treaty compliance
  system. BIS maintains the Commerce Control List (CCL), administers the
  Consolidated Screening List (CSL), and operates the SNAP-R licensing system.
apis:
  - aid: bureau-of-industry-and-security:consolidated-screening-list-api
    name: Consolidated Screening List (CSL) API
    tags:
      - Compliance
      - Export Controls
      - Federal Government
      - Sanctions
      - Screening
    humanURL: https://www.trade.gov/consolidated-screening-list
    baseURL: https://api.trade.gov/gateway/v1/consolidated_screening_list
    properties:
      - url: https://www.trade.gov/consolidated-screening-list
        type: Documentation
      - url: https://api.trade.gov/gateway/v1/consolidated_screening_list/search
        type: DataAPI
    description: >-
      The Consolidated Screening List (CSL) API consolidates export screening
      lists from the Departments of Commerce, State, and Treasury. It includes
      the Entity List, Denied Persons List, Unverified List (BIS), ITAR
      Debarred List (State), SDN List, and others. Used for trade compliance
      and due diligence screening.
    x-features:
      - Consolidated view of multiple export control screening lists
      - Full-text search by name, country, and address
      - Fuzzy name matching for due diligence
      - REST API with JSON responses
      - API key authentication via api.data.gov
    x-use-cases:
      - Export compliance screening before transactions
      - Automated trade partner due diligence
      - Sanctions and embargo verification
      - Regulatory compliance workflows
  - aid: bureau-of-industry-and-security:snap-r
    name: SNAP-R Export License Application System
    tags:
      - Export Controls
      - Federal Government
      - Licensing
    humanURL: https://snapr.bis.doc.gov/
    properties:
      - url: https://www.bis.gov/licensing/how-to-apply-snap-r
        type: Documentation
    description: >-
      SNAP-R (Simplified Network Application Process Redesign) is the BIS
      online system for applying for export licenses, classifications, and
      authorizations under the Export Administration Regulations (EAR).
  - aid: bureau-of-industry-and-security:stela
    name: STELA Export License Tracking
    tags:
      - Export Controls
      - Federal Government
      - Licensing
      - Tracking
    humanURL: https://www.bis.gov/licensing/stela
    properties:
      - url: https://www.bis.gov/licensing/stela
        type: Documentation
    description: >-
      STELA (System for Tracking Export License Applications) allows applicants
      to check the status of export license applications submitted to BIS.
